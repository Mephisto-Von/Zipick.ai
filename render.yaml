services:
  - type: web
    name: zipick-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zipick-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: zipick-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: RUST_LOG
        value: zipick=info,tower_http=info
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gpt-4o
      - key: QDRANT_URL
        value: http://zipick-qdrant:6333

databases:
  - name: zipick-db
    plan: starter
    databaseName: zipick
    user: zipick

redis:
  - name: zipick-redis
    plan: starter
