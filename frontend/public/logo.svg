<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="800" height="900">
  <defs>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2B7DE9;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#2B5FE9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B3DFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="zGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2B7DE9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B3DFF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shopping bag / Z shape -->
  <!-- Handle -->
  <path d="M 290 180 Q 290 110 380 110 Q 470 110 470 180" 
        stroke="#1A1F3D" stroke-width="38" fill="none" stroke-linecap="round"/>

  <!-- Bag body forming the Z -->
  <path d="M 220 220 L 530 220 L 530 310 L 540 310 L 540 220 L 530 220 
           L 260 500 L 530 500 L 530 600 L 220 600 L 220 510 L 210 510 
           L 210 600 L 220 600 
           L 220 220 Z" 
        fill="url(#bagGrad)"/>

  <!-- The diagonal Z stroke -->
  <path d="M 260 220 L 490 500 L 220 500 Z" fill="#7B33E8" opacity="0.6"/>

  <!-- Magnifying glass -->
  <circle cx="570" cy="530" r="65" stroke="#1A1F3D" stroke-width="14" fill="white"/>
  <line x1="615" y1="575" x2="660" y2="620" stroke="#1A1F3D" stroke-width="14" stroke-linecap="round"/>
  
  <!-- Checkmark inside magnifying glass -->
  <path d="M 545 530 L 565 550 L 600 510" stroke="#8B3DFF" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Text: Zipick -->
  <text x="400" y="750" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="110" fill="#1A1F3D" text-anchor="middle">Zipick</text>
  <!-- Text: .ai -->
  <text x="400" y="750" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="110" fill="#8B3DFF" text-anchor="middle" dx="265">.ai</text>

  <!-- Tagline -->
  <text x="400" y="820" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="28" fill="#1A1F3D" text-anchor="middle" letter-spacing="4">FIND IT. COMPARE IT. BUY IT. </text>
  <text x="400" y="820" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="28" fill="#8B3DFF" text-anchor="middle" letter-spacing="4" dx="195">SMARTER.</text>
</svg>
