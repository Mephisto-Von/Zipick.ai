apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: zipick
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: zipick-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipick-api
  namespace: zipick
spec:
  replicas: 3
  selector:
    matchLabels:
      app: zipick-api
  template:
    metadata:
      labels:
        app: zipick-api
    spec:
      containers:
        - name: api
          image: zipick/api:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: zipick-secrets
                  key: database-url
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: QDRANT_URL
              value: http://qdrant:6333
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: zipick-secrets
                  key: jwt-secret
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zipick-secrets
                  key: openai-api-key
            - name: ENVIRONMENT
              value: production
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zipick-api
  namespace: zipick
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zipick-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
