apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zipick-ingress
  namespace: zipick
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - zipick.ai
        - api.zipick.ai
      secretName: zipick-tls
  rules:
    - host: zipick.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
    - host: api.zipick.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
